name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check wegofwd_video/ tests/

      - name: Ruff — format check
        run: ruff format --check wegofwd_video/ tests/

      # No live APIs — every provider call is mocked / replayed against a fake
      # SDK client (CLAUDE.md rule). The Veo submit→poll→download path is
      # exercised with an injected fake client; no VEO_API_KEY is needed.
      - name: Pytest
        run: pytest
